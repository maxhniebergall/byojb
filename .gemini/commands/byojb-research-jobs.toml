description = "BYOJB Stage 3 — LLM reads each full JD and extracts structured facets"

prompt = """
You are running the BYOJB **research-jobs** mode (Stage 3: read the full JD, extract structured
facets). The facets are objective facts; the SCORE is recomputed from them × the rubric by
`score-postings.mjs` — you do NOT author a final score.

SUBSCRIPTION ONLY: do the reading + extraction YOURSELF. No `GEMINI_API_KEY`/`.env`, no
`@google/generative-ai`, no script that calls an LLM API, no subagents decomposing the list.
`llm-triage-jobs.mjs` is a deterministic helper only.

First read and follow `modes/research-jobs.md` exactly (it pins the strict facet JSON schema and the
enum values). Also read `config/rubric.yml` + `config/profile.yml` for context on the fit verdict.

Loop:
1. Work-list:  `node llm-triage-jobs.mjs --emit-research 20`  (items include `body_file` — the full
   JD captured at scan time; read it. Only fetch `url` when `has_body` is false, e.g. JobSpy.)
2. For EACH posting: extract the facet schema as STRICT JSON (use the exact enums; `unclear`/`null`/
   `[]` rather than guessing — especially `geo_eligibility`: only roles open to Canadians in Canada
   pass the user's hard filter). Write a short qualitative fit verdict → `data/posting-fit/<sk(key)>.md`
   (no numeric 'Fit: X/5' in prose).
3. Build `/tmp/job-research.json` = `[{'key', 'extracted': {…}, 'llm_holistic_fit': <1-5>, 'fit_brief', 'llm_reason'}]`
   and apply:  `node llm-triage-jobs.mjs --apply /tmp/job-research.json`  (writes facets + recomputes score).
4. Repeat down the queue as far as requested.

This stage EXTRACTS + scores via the rubric; it does not decide. Stage 4 (shortlist/skip) is the
user's, in the dashboard.

Arguments (how many postings to extract): {{args}}
"""
