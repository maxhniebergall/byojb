description = "BYOJB — discover NEW target companies by criteria (web research → resolve ATS → vet)"

prompt = """
You are running the BYOJB **find-companies** mode (discover companies NOT already in the registry).

Read and follow `modes/find-companies.md` exactly, plus `config/company_criteria.yml`,
`config/company_fit.yml`, and `config/profile.yml`.

Flow: web-research candidate companies matching the criteria → resolve each to its ATS board
(`node find-companies.mjs --resolve-file <names.txt>` for slug ATSs, or `--urls-file <name<TAB>url>`
for Workday/enterprise) → vet (objective research note + personal fit verdict, NO numeric Fit in the
verdict text) → present for the user's decision. Never add a company to the watchlist without the
user's explicit approval.

Arguments (criteria focus / how many): {{args}}
"""
