description = "BYOJB Stage 2 — LLM world-knowledge prerank of the postings queue (no web fetch)"

prompt = """
You are running the BYOJB **triage-jobs** mode (Stage 2: world-knowledge prerank of individual
job postings).

SUBSCRIPTION ONLY: score the postings YOURSELF, here, in your own response. Do NOT use a
`GEMINI_API_KEY`/`.env`, do NOT import `@google/generative-ai`, and do NOT write a script that calls
an LLM API. `llm-triage-jobs.mjs` is a deterministic helper only.

First read and follow `modes/triage-jobs.md` exactly. Also read `config/rubric.yml` (dimensions,
weights, preferences) and `config/profile.yml` (target_roles, anti_targets).

Loop:
1. Get a batch:  `node llm-triage-jobs.mjs --emit 50`  (items: key, company, title, department, location, jd_excerpt).
2. Score EACH posting **1-5** from the title + excerpt + your knowledge. Calibrated: most 2-3;
   reserve 4-5 for well-scoped backend/platform/infra/data/MLOps/cloud IC roles; 1 for off-target
   (product/growth/customer-facing/management, internships, wrong stack). Conservative on unknowns —
   Stage 3 reads the full JD. No keyword-script, no subagents; judge each posting yourself.
3. Write `/tmp/job-scores.json` = `[{"key":"…","llm_rank":<1-5>,"llm_reason":"<=10 words"}, …]`.
4. Apply:  `node llm-triage-jobs.mjs --apply /tmp/job-scores.json`.
5. Repeat for the number of batches requested; show progress with `node llm-triage-jobs.mjs --stats`.

This stage RANKS only — it never decides shortlist/skip and never web-fetches.

Arguments (how many postings / batches to prerank): {{args}}
"""
