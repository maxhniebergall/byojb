<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{--bg:#0f1020;--card:#1a1c33;--ink:#e8e9f3;--mut:#9aa0c0;--line:#2a2d4a;--accent:#7c8cff;--good:#3ec98a;--warn:#e0b341;--bad:#e0556e;}
  *{box-sizing:border-box;} body{margin:0;width:380px;font:13px/1.45 -apple-system,system-ui,Segoe UI,sans-serif;background:var(--bg);color:var(--ink);}
  header{padding:.6rem .8rem;border-bottom:1px solid var(--line);font-weight:600;display:flex;align-items:center;gap:.5rem;}
  header .dot{width:8px;height:8px;border-radius:50%;background:var(--mut);}
  header .dot.ok{background:var(--good);} header .dot.err{background:var(--bad);}
  #status{padding:.5rem .8rem;color:var(--mut);font-size:.82rem;}
  #verdict{padding:0 .8rem .4rem;font-size:.82rem;color:var(--mut);}
  .grp{padding:.3rem .8rem;} .grp h4{margin:.5rem 0 .25rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);}
  .row{display:flex;align-items:center;gap:.4rem;padding:.2rem 0;border-bottom:1px solid var(--line);}
  .lab{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .val{color:var(--good);max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tag{font-size:.66rem;padding:.05rem .35rem;border-radius:99px;background:#23264a;color:var(--mut);}
  select{background:#0c0d1c;border:1px solid var(--line);color:var(--ink);border-radius:6px;font:inherit;padding:.15rem .25rem;max-width:42%;}
  button{border:1px solid var(--line);background:#23264a;color:var(--ink);padding:.35rem .7rem;border-radius:7px;cursor:pointer;font:inherit;}
  button.sm{padding:.15rem .45rem;font-size:.74rem;}
  button.primary{background:var(--accent);color:#0b0c18;border-color:var(--accent);font-weight:600;}
  .actions{padding:.6rem .8rem;border-top:1px solid var(--line);display:flex;gap:.5rem;align-items:center;}
  .hint{font-size:.74rem;color:var(--warn);}
  footer{padding:.4rem .8rem;border-top:1px solid var(--line);font-size:.72rem;color:var(--mut);display:flex;align-items:center;gap:.4rem;}
  footer input{flex:1;background:#0c0d1c;border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:.2rem .35rem;font:inherit;}
</style>
</head>
<body>
<header><span class="dot" id="conn"></span> Career-Ops Autofill</header>
<div id="status">Analyzing this page…</div>
<div id="verdict"></div>
<div id="groups"></div>
<div class="actions">
  <button class="primary" id="fill">Fill known fields</button>
  <button id="remember" title="Save the answers currently on this page so identical questions auto-fill next time">Remember answers</button>
  <span class="hint" id="hint"></span>
</div>
<footer>dashboard <input id="base" placeholder="http://localhost:4173"></footer>
<script src="popup.js"></script>
</body>
</html>
