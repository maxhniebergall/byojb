<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>career-ops — job dashboard</title>
<style>
  :root { --bg:#0f1020; --card:#1a1c33; --ink:#e8e9f3; --mut:#9aa0c0; --line:#2a2d4a; --accent:#7c8cff; --good:#3ec98a; --warn:#e0b341; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 -apple-system,system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:1.2rem 1.5rem; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:1rem; flex-wrap:wrap; }
  header h1 { font-size:1.25rem; margin:0; }
  header .sub { color:var(--mut); font-size:.85rem; }
  .wrap { display:grid; grid-template-columns: 280px 1fr; gap:1.25rem; padding:1.25rem 1.5rem; align-items:start; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:1rem 1.1rem; }
  .panel h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.06em; color:var(--mut); margin:0 0 .8rem; }
  .dim { margin-bottom:.55rem; }
  .dim .row { display:flex; justify-content:space-between; font-size:.82rem; margin-bottom:.2rem; }
  .dim .bar { height:6px; background:#0c0d1c; border-radius:4px; overflow:hidden; }
  .dim .bar > i { display:block; height:100%; background:linear-gradient(90deg,var(--accent),#a36bff); }
  .interp { font-size:.78rem; color:var(--mut); margin-top:.8rem; border-top:1px solid var(--line); padding-top:.6rem; }
  .controls { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:.9rem; align-items:center; }
  .tab { background:none; border:1px solid var(--line); color:var(--ink); padding:.45rem .9rem; border-radius:8px; cursor:pointer; font-size:.85rem; }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#0b0c18; font-weight:600; }
  input, select { background:#0c0d1c; border:1px solid var(--line); color:var(--ink); padding:.45rem .6rem; border-radius:8px; font-size:.85rem; }
  input[type=search]{ min-width:220px; }
  table { width:100%; border-collapse:collapse; font-size:.86rem; }
  th, td { text-align:left; padding:.55rem .6rem; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--mut); font-weight:600; cursor:pointer; user-select:none; white-space:nowrap; }
  th:hover { color:var(--ink); }
  tr:hover td { background:#191b30; }
  .score { font-weight:700; font-variant-numeric:tabular-nums; }
  .score.s-high{ color:var(--good); } .score.s-mid{ color:var(--warn); } .score.s-low{ color:var(--mut); }
  .pill { font-size:.72rem; padding:.12rem .5rem; border-radius:99px; background:#23264a; color:var(--mut); white-space:nowrap; }
  .why { color:var(--mut); max-width:34rem; }
  a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
  .count { color:var(--mut); font-size:.8rem; }
  .empty { color:var(--mut); padding:2rem; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>career-ops</h1>
  <span class="sub" id="subtitle">loading…</span>
</header>
<div class="wrap">
  <aside class="panel" id="rubric"><h2>Active rubric</h2><div id="dims"></div></aside>
  <main>
    <div class="controls">
      <button class="tab active" data-tab="ranked" id="tab-ranked">Ranked (evaluated)</button>
      <button class="tab" data-tab="discovered" id="tab-discovered">Discovered (pending)</button>
      <input type="search" id="q" placeholder="filter by company, title, source…">
      <select id="srcFilter"><option value="">all sources</option></select>
    </div>
    <div class="count" id="count"></div>
    <div id="view"></div>
  </main>
</div>
<script>
let DATA = { rubric:{dimensions:[]}, evaluated:[], discovered:[] };
let tab = 'ranked';
let sort = { ranked:{key:'score',dir:-1}, discovered:{key:'date',dir:-1} };

const $ = s => document.querySelector(s);
const esc = s => (s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function scoreClass(s){ if(s==null) return 's-low'; if(s>=4) return 's-high'; if(s>=3.5) return 's-mid'; return 's-low'; }

function renderRubric(){
  const dims = DATA.rubric.dimensions || [];
  const max = Math.max(1, ...dims.map(d=>+d.weight||0));
  $('#dims').innerHTML = dims.map(d=>`
    <div class="dim"><div class="row"><span>${esc(d.name)}</span><span>${esc(d.weight)}%</span></div>
    <div class="bar"><i style="width:${(100*(+d.weight||0)/max)}%"></i></div></div>`).join('')
    + (DATA.rubric.score_interpretation?.length
        ? `<div class="interp">${DATA.rubric.score_interpretation.map(s=>`<div><b>${esc(s.min)}+</b> ${esc(s.label)}</div>`).join('')}</div>`
        : '');
}

function rows(){
  const q = $('#q').value.trim().toLowerCase();
  const src = $('#srcFilter').value;
  let list = tab==='ranked' ? DATA.evaluated.slice() : DATA.discovered.slice();
  if(q) list = list.filter(r => JSON.stringify(r).toLowerCase().includes(q));
  if(src) list = list.filter(r => (r.source||r.archetype||'')===src);
  const s = sort[tab];
  list.sort((a,b)=>{
    let av=a[s.key], bv=b[s.key];
    if(s.key==='score'){ av=av??-1; bv=bv??-1; return (bv-av)*-s.dir; }
    return String(av??'').localeCompare(String(bv??''))*s.dir;
  });
  return list;
}

function th(key,label){ const s=sort[tab]; const ar=s.key===key?(s.dir<0?' ▼':' ▲'):''; return `<th data-k="${key}">${label}${ar}</th>`; }

function render(){
  const list = rows();
  $('#count').textContent = `${list.length} ${tab==='ranked'?'evaluated':'discovered'} job${list.length===1?'':'s'}`;
  if(!list.length){ $('#view').innerHTML = `<div class="empty">${tab==='ranked'?'No evaluations yet. Run <code>/career-ops pipeline</code> to score discovered jobs.':'No discovered jobs. Run <code>node scan.mjs</code>.'}</div>`; return; }
  let html='<table><thead><tr>';
  if(tab==='ranked'){
    html += th('score','Score')+th('company','Company')+th('role','Role')+th('archetype','Archetype')+'<th>Why it matched</th><th>Report</th>';
    html += '</tr></thead><tbody>';
    for(const r of list){
      html += `<tr>
        <td class="score ${scoreClass(r.score)}">${r.score!=null?r.score.toFixed(1):'—'}</td>
        <td>${esc(r.company)}${r.url?` <a href="${esc(r.url)}" target="_blank" title="job posting">↗</a>`:''}</td>
        <td>${esc(r.role)}</td>
        <td><span class="pill">${esc(r.archetype||'—')}</span></td>
        <td class="why">${esc(r.why||'')}</td>
        <td>${r.report?`<a href="/report?f=${encodeURIComponent(r.report)}" target="_blank">view</a>`:'—'}</td>
      </tr>`;
    }
  } else {
    html += th('company','Company')+th('title','Title')+th('location','Location')+th('source','Source')+th('date','Found')+'<th>Link</th>';
    html += '</tr></thead><tbody>';
    for(const r of list){
      html += `<tr>
        <td>${esc(r.company)}</td><td>${esc(r.title)}</td><td>${esc(r.location||'—')}</td>
        <td><span class="pill">${esc(r.source)}</span></td><td>${esc(r.date)}</td>
        <td><a href="${esc(r.url)}" target="_blank">open ↗</a></td>
      </tr>`;
    }
  }
  html+='</tbody></table>';
  $('#view').innerHTML = html;
  $('#view').querySelectorAll('th[data-k]').forEach(el=>el.onclick=()=>{
    const k=el.dataset.k, s=sort[tab];
    if(s.key===k) s.dir*=-1; else { s.key=k; s.dir = k==='score'?-1:1; }
    render();
  });
}

function refreshSources(){
  const set = new Set();
  (tab==='ranked'?DATA.evaluated.map(r=>r.archetype):DATA.discovered.map(r=>r.source)).forEach(v=>v&&set.add(v));
  $('#srcFilter').innerHTML = '<option value="">all sources</option>'+[...set].sort().map(v=>`<option>${esc(v)}</option>`).join('');
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); tab=b.dataset.tab; $('#q').value=''; refreshSources(); render();
});
$('#q').oninput = render;
$('#srcFilter').onchange = render;

fetch('/api/data').then(r=>r.json()).then(d=>{
  DATA=d;
  $('#subtitle').textContent = `${d.evaluated.length} evaluated · ${d.discovered.length} discovered · rubric: ${d.rubric.dimensions?.length||0} dimensions`;
  renderRubric(); refreshSources(); render();
}).catch(e=>{ $('#subtitle').textContent='failed to load data'; console.error(e); });
</script>
</body>
</html>
