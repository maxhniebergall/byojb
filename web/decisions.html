<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>career-ops — decision console</title>
<style>
  :root{--bg:#0f1020;--card:#1a1c33;--ink:#e8e9f3;--mut:#9aa0c0;--line:#2a2d4a;--accent:#7c8cff;--good:#3ec98a;--bad:#e0556e;--warn:#e0b341;}
  *{box-sizing:border-box;} body{margin:0;font:14px/1.5 -apple-system,system-ui,Segoe UI,sans-serif;background:var(--bg);color:var(--ink);}
  header{padding:.9rem 1.25rem;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;}
  header h1{font-size:1.1rem;margin:0;} header .counts{color:var(--mut);font-size:.85rem;}
  .wrap{display:grid;grid-template-columns:minmax(360px,460px) 1fr;gap:1rem;padding:1rem 1.25rem;align-items:start;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;}
  .controls{display:flex;gap:.5rem;flex-wrap:wrap;padding:.7rem;border-bottom:1px solid var(--line);align-items:center;}
  .tab{background:none;border:1px solid var(--line);color:var(--ink);padding:.35rem .7rem;border-radius:7px;cursor:pointer;font-size:.8rem;}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#0b0c18;font-weight:600;}
  input,textarea,select{background:#0c0d1c;border:1px solid var(--line);color:var(--ink);border-radius:7px;font:inherit;padding:.4rem .55rem;}
  input[type=search]{flex:1;min-width:140px;}
  .list{max-height:78vh;overflow:auto;}
  .row{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border-bottom:1px solid var(--line);cursor:pointer;}
  .row:hover{background:#191b30;} .row.sel{background:#23264a;}
  .badge{font-weight:700;font-variant-numeric:tabular-nums;min-width:2.1rem;text-align:center;border-radius:6px;padding:.1rem .3rem;font-size:.82rem;}
  .b-hi{color:#0b0c18;background:var(--good);} .b-mid{color:#0b0c18;background:var(--warn);} .b-lo{background:#23264a;color:var(--mut);}
  .row .nm{flex:1;min-width:0;} .row .nm b{font-weight:600;} .row .nm small{color:var(--mut);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pill{font-size:.68rem;padding:.1rem .45rem;border-radius:99px;background:#23264a;color:var(--mut);white-space:nowrap;}
  .dec{font-size:.7rem;padding:.1rem .4rem;border-radius:6px;}
  .dec.keep{background:rgba(62,201,138,.18);color:var(--good);} .dec.skip{background:rgba(224,85,110,.18);color:var(--bad);}
  .detail{padding:1.1rem 1.25rem;} .detail.empty{color:var(--mut);text-align:center;padding:3rem;}
  .detail h2{margin:.1rem 0;font-size:1.3rem;} .meta{color:var(--mut);font-size:.85rem;margin-bottom:.8rem;}
  .meta a{color:var(--accent);text-decoration:none;} .titles{display:flex;flex-wrap:wrap;gap:.3rem;margin:.4rem 0 1rem;}
  .titles span{font-size:.72rem;background:#0c0d1c;border:1px solid var(--line);border-radius:6px;padding:.12rem .45rem;color:var(--mut);}
  .links{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin:0 0 1rem;}
  .lnk{font-size:.74rem;background:#0c0d1c;border:1px solid var(--line);border-radius:6px;padding:.18rem .5rem;color:var(--accent);text-decoration:none;}
  .lnk:hover{border-color:var(--accent);} .lnk b{color:var(--good);text-transform:uppercase;font-size:.62rem;letter-spacing:.04em;}
  .field{margin:1rem 0;} .field label{display:block;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin-bottom:.35rem;}
  textarea{width:100%;min-height:150px;resize:vertical;font:13px/1.5 ui-monospace,monospace;}
  .btn{border:1px solid var(--line);background:#23264a;color:var(--ink);padding:.45rem .8rem;border-radius:8px;cursor:pointer;font-size:.85rem;}
  .btn:hover{border-color:var(--accent);} .btn.keep{background:var(--good);color:#0b0c18;border-color:var(--good);font-weight:600;}
  .btn.skip{background:var(--bad);color:#fff;border-color:var(--bad);font-weight:600;} .btn.sm{padding:.3rem .6rem;font-size:.8rem;}
  .actrow{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin:.6rem 0;}
  .toast{position:fixed;bottom:1rem;right:1rem;background:var(--good);color:#0b0c18;padding:.5rem .9rem;border-radius:8px;font-weight:600;opacity:0;transition:opacity .2s;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header><h1>career-ops · decision console</h1><span class="counts" id="counts">loading…</span></header>
<div class="wrap">
  <div class="panel">
    <div class="controls">
      <button class="tab active" data-f="undecided">To decide</button>
      <button class="tab" data-f="keep">Kept</button>
      <button class="tab" data-f="skip">Skipped</button>
      <button class="tab" data-f="all">All</button>
      <input type="search" id="q" placeholder="filter…">
      <label style="font-size:.75rem;color:var(--mut)"><input type="checkbox" id="resOnly"> researched only</label>
    </div>
    <div class="list" id="list"></div>
  </div>
  <div class="panel"><div class="detail empty" id="detail">Select a company from the queue →</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
let QUEUE=[], filter='undecided', sel=null;
const $=s=>document.querySelector(s);
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const bcls=v=>v>=4?'b-hi':v>=3?'b-mid':'b-lo';
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400);}

async function loadQueue(){QUEUE=await (await fetch('/api/queue')).json();renderCounts();renderList();}
function renderCounts(){const u=QUEUE.filter(r=>r.decision==='undecided').length,k=QUEUE.filter(r=>r.decision==='keep').length,s=QUEUE.filter(r=>r.decision==='skip').length;$('#counts').textContent=`${u} to decide · ${k} kept · ${s} skipped · ${QUEUE.length} total (consulting/outsourcing excluded)`;}
function renderList(){
  const q=$('#q').value.trim().toLowerCase(), resOnly=$('#resOnly').checked;
  let list=QUEUE.filter(r=>filter==='all'?true:r.decision===filter);
  if(resOnly) list=list.filter(r=>r.researched);
  if(q) list=list.filter(r=>(r.name+r.company_type+r.reason).toLowerCase().includes(q));
  $('#list').innerHTML=list.map(r=>`<div class="row ${sel===r.key?'sel':''}" data-k="${esc(r.key)}">
    <span class="badge ${r.score!=null?bcls(r.score):'b-lo'}" title="${r.score!=null?(r.researched?'web-researched fit':'world-knowledge prerank'):'not yet LLM-ranked'}">${r.score!=null?Number(r.score).toFixed(1):'·'}</span>
    <span class="nm"><b>${esc(r.name)}</b><small>${esc(r.provider)} · ${r.remote_relevant??'?'} remote roles${r.reason?' · '+esc(r.reason):''}</small></span>
    <span class="pill">${esc(r.company_type)}</span>
    ${r.researched?'<span class="pill" title="web-researched" style="background:rgba(124,140,255,.18);color:var(--accent)">✓R</span>':''}
    ${r.decision!=='undecided'?`<span class="dec ${r.decision}">${r.decision}</span>`:''}
  </div>`).join('')||'<div class="detail empty">nothing here</div>';
  $('#list').querySelectorAll('.row').forEach(el=>el.onclick=()=>openCompany(el.dataset.k));
}
async function openCompany(key){
  sel=key;renderList();
  const c=await (await fetch('/api/company?key='+encodeURIComponent(key))).json();
  $('#detail').className='detail';
  $('#detail').innerHTML=`
    <h2>${esc(c.name)} ${c.decision!=='undecided'?`<span class="dec ${c.decision}">${c.decision}</span>`:''}</h2>
    <div class="meta">${esc(c.provider)} · ${esc(c.company_type||'unknown')} · ${c.relevant??'?'} relevant / ${c.remote_relevant??'?'} remote-eligible openings
      ${c.careers_url?` · <a href="${esc(c.careers_url)}" target="_blank">careers ↗</a>`:''}</div>
    <div class="titles">${(c.sample_titles||[]).map(t=>`<span>${esc(t)}</span>`).join('')}</div>
    ${c.links&&c.links.length?`<div class="links"><span style="font-size:.72rem;color:var(--mut)">pages:</span>${c.links.map(l=>`<a class="lnk" href="${esc(l.url)}" target="_blank" rel="noopener">${l.tag?`<b>${esc(l.tag)}</b> `:''}${esc(l.label)} ↗</a>`).join('')}</div>`:''}
    <div class="actrow">
      <label style="font-size:.78rem;color:var(--mut)">Ranking (0–5):</label>
      <input id="rankIn" type="number" min="0" max="5" step="0.1" value="${c.llm_fit??c.llm_rank??''}" style="width:5rem">
      <button class="btn sm" id="saveRank">Save rank</button>
      <span style="flex:1"></span>
      <button class="btn keep" id="bKeep">Keep</button>
      <button class="btn skip" id="bSkip">Skip</button>
      <button class="btn sm" id="bUndo">Reset</button>
    </div>
    <div class="field"><label>Fit verdict (your rubric — editable)</label><textarea id="taFit">${esc(c.fit_verdict)}</textarea>
      <button class="btn sm" id="saveFit" style="margin-top:.4rem">Save fit verdict</button></div>
    <div class="field"><label>Research note (objective — editable)</label><textarea id="taRes">${esc(c.research_note)}</textarea>
      <button class="btn sm" id="saveRes" style="margin-top:.4rem">Save research note</button></div>`;
  const post=(p,b)=>fetch(p,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(b)});
  $('#bKeep').onclick=async()=>{await post('/api/decision',{key,decision:'keep'});toast('kept');await loadQueue();openCompany(key);};
  $('#bSkip').onclick=async()=>{await post('/api/decision',{key,decision:'skip'});toast('skipped');await loadQueue();openCompany(key);};
  $('#bUndo').onclick=async()=>{await post('/api/decision',{key,decision:'undecided'});toast('reset');await loadQueue();openCompany(key);};
  $('#saveRank').onclick=async()=>{const r=await post('/api/rank',{key,llm_fit:$('#rankIn').value});toast((await r.json()).ok?'rank saved':'rank 0-5 only');await loadQueue();};
  $('#saveFit').onclick=async()=>{await post('/api/report',{key,which:'fit',content:$('#taFit').value});toast('fit verdict saved');};
  $('#saveRes').onclick=async()=>{await post('/api/report',{key,which:'research',content:$('#taRes').value});toast('research note saved');};
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.f;renderList();});
$('#q').oninput=renderList; $('#resOnly').onchange=renderList;
loadQueue();
</script>
</body>
</html>
